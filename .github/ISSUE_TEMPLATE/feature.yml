name: Product idea or feature
description: Propose a customer problem before implementation
title: "[Idea] "
body:
  - type: textarea
    id: user
    attributes:
      label: Target user and context
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Observed problem and evidence
    validations:
      required: true
  - type: textarea
