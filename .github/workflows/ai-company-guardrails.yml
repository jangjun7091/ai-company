name: AI Company Guardrails
on:
  pull_request:
  push:
    branches: [main]

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/doctor.py
      - run: python -m unittest discover -s tests -p 'test_*.py'
