# Portfolio-level state, updated by the weekly operating review and the
# incident-to-learning workflow. `portfolio_stage` must be one of
# lifecycle.portfolio_stages in ai-company.yaml.
portfolio_stage: formation # formation | operating | scaling; weekly-operating-review advances it
active_products: [] # products in operation; weekly-operating-review keeps this current
company_priorities: [] # weekly-operating-review output
founder_review_queue: [] # items waiting for founder decision
capability_gaps: [] # weekly-operating-review: repeated agent limitations
repeated_failures: [] # incident-to-learning: failure classes seen more than once
